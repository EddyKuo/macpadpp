name: Release

# 打 tag（v* 例：v0.1.0）並 push 即自動建置、同梱 Qt、打包 DMG 並發佈 GitHub Release。
# 也可在 Actions 頁面手動觸發（workflow_dispatch）做測試建置，只上傳 artifact 不發佈。
#
# 註：GitHub-hosted 的 Intel（macos-13）執行器供應已極稀缺/退場中，工作常卡在 queued，
# 故此工作流僅產出 Apple Silicon（arm64）DMG。Intel 使用者請自行建置（見 README），
# 或日後改用 self-hosted / 付費執行器再加回 x86_64 矩陣。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本號（不含 v 前綴），供手動測試建置用'
        default: '0.0.0-dev'

permissions:
  contents: write   # 發佈 Release 需要寫入權限

jobs:
  build:
    name: Build arm64
    runs-on: macos-14      # Apple Silicon
    timeout-minutes: 60
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: 安裝相依（Homebrew）
        run: brew install cmake qt qscintilla2

      - name: 解析版本號
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="${{ github.event.inputs.version }}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "解析到版本：$V"

      - name: 建置 + 同梱 + 打包 DMG
        run: bash scripts/package_macos.sh "${{ steps.ver.outputs.version }}" "arm64"

      - name: 上傳 DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macpad-arm64
          path: dist/*.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      QT_VERSION: 6.8.1
      QSCI_VERSION: 2.14.1
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: 解析版本號
        id: ver
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then V="${GITHUB_REF_NAME#v}"; else V="${{ github.event.inputs.version }}"; fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: 安裝 Qt（含 WebEngine / Core5Compat 等模組）
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qt5compat qtwebengine qtwebchannel qtpositioning qtimageformats
          cache: true

      - name: 啟用 MSVC 開發者環境
        uses: ilammy/msvc-dev-cmd@v1

      - name: 建置並安裝 QScintilla
        shell: cmd
        run: |
          curl -L -o qsci.tar.gz https://www.riverbankcomputing.com/static/Downloads/QScintilla/%QSCI_VERSION%/QScintilla_src-%QSCI_VERSION%.tar.gz
          tar -xzf qsci.tar.gz
          cd QScintilla_src-%QSCI_VERSION%\src
          qmake qscintilla.pro && nmake && nmake install

      - name: 建置 + windeployqt 打包 zip
        shell: pwsh
        run: |
          $env:QTDIR = $env:QT_ROOT_DIR
          $env:PATH = "$env:QT_ROOT_DIR\bin;$env:PATH"
          pwsh scripts/package_windows.ps1 -Version "${{ steps.ver.outputs.version }}" -QtPrefix "$env:QT_ROOT_DIR"

      - name: 上傳 zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: macpad-win-x64
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build, build-windows]
    if: github.ref_type == 'tag'   # 只有打 tag 才真正發佈
    runs-on: ubuntu-latest
    steps:
      - name: 取出原始碼（供讀取 tag 標註說明）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 需完整歷史與 tag，才能取出 annotated tag 的說明文字

      - name: 下載 DMG
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 建立 Release 並附上 DMG
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DMGS=$(find artifacts -name '*.dmg')
          echo "附加檔案："; echo "$DMGS"
          # Release 說明 = annotated tag 的說明文字（人工撰寫的重點）＋ --generate-notes 自動附上的 commit/PR 清單
          git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents)' > release_notes.md
          echo "--- Release notes 內容 ---"; cat release_notes.md
          gh release create "$GITHUB_REF_NAME" $DMGS \
            --repo "$GITHUB_REPOSITORY" \
            --title "macpad++ $GITHUB_REF_NAME" \
            --notes-file release_notes.md \
            --generate-notes
