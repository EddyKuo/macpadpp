<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #ffffff; --fg: #24292f; --muted: #57606a; --border: #d0d7de;
    --code-bg: #f6f8fa; --link: #0969da; --quote: #656d76;
  }
  body.dark {
    --bg: #0d1117; --fg: #e6edf3; --muted: #8b949e; --border: #30363d;
    --code-bg: #161b22; --link: #58a6ff; --quote: #8b949e;
  }
  html, body { margin: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font: 15px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI",
          "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
    padding: 20px 26px; word-wrap: break-word;
  }
  #content { max-width: 860px; margin: 0 auto; }
  h1, h2 { border-bottom: 1px solid var(--border); padding-bottom: .3em; }
  h1, h2, h3, h4 { margin: 1.2em 0 .6em; line-height: 1.25; }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }
  code {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: .88em; background: var(--code-bg);
    padding: .2em .4em; border-radius: 5px;
  }
  pre { background: var(--code-bg); padding: 14px 16px; border-radius: 8px; overflow: auto; }
  pre code { background: none; padding: 0; }
  pre.mermaid { background: transparent; text-align: center; padding: 8px 0; }
  blockquote {
    margin: 0; padding: 0 1em; color: var(--quote);
    border-left: .25em solid var(--border);
  }
  table { border-collapse: collapse; display: block; overflow: auto; }
  th, td { border: 1px solid var(--border); padding: 6px 13px; }
  tr:nth-child(2n) td { background: var(--code-bg); }
  img { max-width: 100%; }
  hr { border: none; border-top: 1px solid var(--border); }
</style>
<script src="marked.min.js"></script>
<script src="mermaid.min.js"></script>
</head>
<body>
<div id="content"></div>
<script>
  let _lastDark = false;
  // 由 C++ 呼叫:render(markdownText, darkBool)
  async function render(md, dark) {
    if (dark) document.body.classList.add('dark');
    else document.body.classList.remove('dark');
    // 主題變更或首次 → 重新初始化 mermaid 主題
    mermaid.initialize({ startOnLoad: false, securityLevel: 'strict',
                         theme: dark ? 'dark' : 'default' });
    _lastDark = dark;

    const y = window.scrollY;                       // 保留捲動位置
    const c = document.getElementById('content');
    c.innerHTML = marked.parse(md || '');

    // 把 ```mermaid 程式碼區塊轉成 mermaid 可渲染的節點
    c.querySelectorAll('code.language-mermaid').forEach(code => {
      const pre = document.createElement('pre');
      pre.className = 'mermaid';
      pre.textContent = code.textContent;
      code.parentElement.replaceWith(pre);
    });
    try {
      await mermaid.run({ querySelector: '.mermaid' });
    } catch (e) { console.log('mermaid:', e); }
    window.scrollTo(0, y);
  }
</script>
</body>
</html>
